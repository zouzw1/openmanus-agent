id: manus
name: Manus
enabled: true
executor-type: manus
description: General-purpose execution agent for coding, file inspection, and tool orchestration.
planning-visible: true
priority: 100
system-prompt: |
  You are the general-purpose Manus execution agent.

  Focus on concrete progress. Read before editing. Keep outputs concise and grounded in tool results.

  If a capability is not available in the current runtime, do not pretend it exists.
capabilities:
  local-tools:
    mode: allow_list
    ids:
      - tool:listWorkspaceFiles
      - tool:readWorkspaceFile
      - tool:writeWorkspaceFile
      - tool:runPowerShell
      - tool:createPlan
      - tool:getPlan
      - tool:browserAction
      - tool:runSandboxCommand
      - tool:callMcpTool
  mcp:
    mode: allow_list
    servers:
      - demo-sse
  skills:
    mode: allow_list
    ids:
      - skill:project-planning
      - skill:pdf
      - skill:pptx
      - skill:docx
      - skill:docx-format
      - skill:markdown-converter
      - skill:skill-creator
      - skill:tavily-search-pro
rag:
  enabled: true
  mode: tool

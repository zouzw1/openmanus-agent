spring:
  application:
    name: openmanus-spring-ai-alibaba
  ai:
    dashscope:
      api-key: sk-e149a15431ec48ceb6a839cab679762e

server:
  port: 8080

openmanus:
  agents:
    enabled: true
    config-location: ./agents
    fail-fast: true
    auto-reload: false
    default-chat-agent-id: manus
  agent:
    max-steps: 8
    workspace: ./workspace
    shell-enabled: false
    shell-timeout-seconds: 15
    workflow-use-data-analysis-agent: true
    planning-validation:
      enabled: false
      fail-on-errors: true
      validate-requested-deliverable: true
      validate-agent-capabilities: true
      validate-skill-output-formats: true
      validate-local-tool-parameters: true
      validate-mcp-capabilities: true
      validate-mcp-arguments: true
    system-prompt: |
      You are OpenManus implemented with Spring AI Alibaba.
      Solve user tasks with concise reasoning and tool usage when needed.
      Prefer reading files before editing them.
      Avoid destructive shell commands.
      
      IMPORTANT DATA HANDLING RULES:
      - NEVER fabricate, invent, or make up data, facts, or information.
      - NEVER use default values, assumptions, or placeholder data when real data is required.
      - ALWAYS use tools to fetch real-time data (e.g., weather, time, location) instead of guessing.
      - If specific information is missing (e.g., city name for weather), explicitly ASK the user to provide it.
      - Clearly distinguish between verified facts and estimates/approximations.
      - When unable to obtain accurate data, state the limitation honestly rather than providing false information.
      - For location-based queries, always confirm the specific location with the user if not provided.
  browser:
    enabled: false
    headless: true
    timeout-seconds: 30
  sandbox:
    enabled: false
    image: python:3.12-slim
    working-directory: /workspace
    memory-limit: 512m
    timeout-seconds: 30
    network-enabled: false
  mcp:
    enabled: true
    servers:
      demo-sse:
        type: sse
        url: http://127.0.0.1:18080/mcp
        sse-endpoint: /sse
  skills:
    enabled: true
    lazy-load: true
    project-skills-directory: ./skills/project
    user-skills-directory: ./skills/user

logging:
  level:
    root: INFO
    com.openmanus.saa: DEBUG
    com.openmanus.saa.tool.McpToolBridge: INFO
    com.openmanus.saa.service.mcp.McpPromptContextService: INFO
    com.openmanus.saa.service.agent: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

spring:
  application:
    name: study-plan-demo
  ai:
    dashscope:
      api-key: sk-e149a15431ec48ceb6a839cab679762e
      embedding:
        enabled: true
        options:
          model: text-embedding-v3

server:
  port: 8091

openmanus:
  agent:
    shell-enabled: true
    shell-timeout-seconds: 120
    system-prompt: |
      You are a study-plan demo built on top of the OpenManus Spring AI Alibaba SDK.
      Use the dedicated learning-plan tools when users ask for study roadmaps, weekly plans, or checklists.
      Do not fabricate outside knowledge when a tool can provide structured guidance.
  mcp:
    enabled: true
    servers:
      demo-sse:
        type: sse
        url: http://127.0.0.1:18080/mcp
        sse-endpoint: /sse
  skills:
    enabled: true
  rag:
    enabled: true
    backend: elasticsearch
    elasticsearch:
      uris:
        - http://127.0.0.1:9200
      index-prefix: openmanus_demo_kb
      vector-dimensions: 1024